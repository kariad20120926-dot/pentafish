<body class="antialiased">
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-[#0D0D0D]/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-[1600px] mx-auto px-10 py-6 flex justify-between items-center">
            <a href="index.html" class="text-5xl tracking-[0.3em] font-westgate text-white">PENTAFISH</a>
            <div class="hidden lg:flex space-x-16 text-[0.65rem] uppercase tracking-[0.4em] font-light">
                <a href="index.html" class="nav-link">Top</a>
                <a href="philosophy.html" class="nav-link">Philosophy</a>
                <a href="collections.html" class="nav-link">Collections</a>
                <a href="craftsmanship.html" class="nav-link">Craftsmanship</a>
                <a href="journal.html" class="nav-link text-gold">Journal</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="lg:hidden">
                <button id="menu-btn" onclick="toggleMenu()" class="focus:outline-none">
                    <i data-lucide="menu" class="w-6 h-6 text-gold"></i>
                </button>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden lg:hidden bg-[#0D0D0D] border-t border-white/5 px-6 py-6 space-y-6 text-[0.65rem] uppercase tracking-[0.4em] font-light">
            <a href="index.html" class="block hover:text-gold transition-colors">Top</a>
            <a href="philosophy.html" class="block hover:text-gold transition-colors">Philosophy</a>
            <a href="collections.html" class="block hover:text-gold transition-colors">Collections</a>
            <a href="craftsmanship.html" class="block hover:text-gold transition-colors">Craftsmanship</a>
            <a href="journal.html" class="block hover:text-gold transition-colors">Journal</a>
            <a href="contact.html" class="block hover:text-gold transition-colors">Contact</a>
        </div>
    </nav>

    <main class="pt-48 pb-40">
        <div class="max-w-3xl mx-auto px-10" id="post-content">
            <!-- populated by journal-data.js -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-20 bg-[#0D0D0D] border-t border-white/5">
        <div class="max-w-[1600px] mx-auto px-10 text-center text-[0.55rem] tracking-[0.4em] text-zinc-500 uppercase">
            <p>&copy; 2026 PENTAFISH. Journal for the Senses.</p>
        </div>
    </footer>

    <script src="journal-data.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function renderPost() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const post = JOURNAL_POSTS.find(p => p.id === id);
            const container = document.getElementById('post-content');

            if (!post) {
                container.innerHTML = `
                    <p class="text-zinc-400 text-sm">記事が見つかりませんでした。</p>
                    <a href="journal.html" class="inline-flex items-center gap-3 text-zinc-400 text-[0.6rem] uppercase tracking-[0.4em] hover:text-gold transition-colors mt-10">
                        <i data-lucide="arrow-left" class="w-3 h-3"></i>
                        Back to Journal
                    </a>`;
                lucide.createIcons();
                return;
            }

            document.title = `${post.title} | PENTAFISH Journal`;

            container.innerHTML = `
                <a href="journal.html" class="inline-flex items-center gap-3 text-zinc-400 text-[0.6rem] uppercase tracking-[0.4em] hover:text-gold transition-colors mb-20">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i>
                    Journal
                </a>

                <div class="flex items-center gap-6 mb-10">
                    <time class="text-zinc-400 text-[0.6rem] uppercase tracking-[0.4em]">${post.date}</time>
                    <span class="text-gold text-[0.5rem] uppercase tracking-[0.3em] border border-gold/30 px-3 py-1">${post.category}</span>
                </div>

                <h1 class="text-3xl md:text-4xl mb-16 serif leading-tight">${post.title}</h1>

                <div class="aspect-video bg-zinc-900 mb-20 overflow-hidden">
                    <img src="${post.image}" alt="Journal Photo" class="w-full h-full object-cover">
                </div>

                <div class="article-body">
                    ${post.body.map(p => `<p>${p}</p>`).join('')}
                </div>

                <div class="border-t border-white/5 mt-20 pt-16">
                    <a href="journal.html" class="inline-flex items-center gap-3 text-zinc-400 text-[0.6rem] uppercase tracking-[0.4em] hover:text-gold transition-colors">
                        <i data-lucide="arrow-left" class="w-3 h-3"></i>
                        Back to Journal
                    </a>
                </div>
            `;

            lucide.createIcons();
        }

        renderPost();
    </script>
