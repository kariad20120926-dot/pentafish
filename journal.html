<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | PENTAFISH</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-solid: #0D0D0D;
            --gold-accent: #D4AF37;
            --light-grey: #F2F2F2;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-solid);
            color: var(--light-grey);
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Noto Sans JP', sans-serif;
        }

        @font-face {
            font-family: 'Westgate';
            src: url('assets/Westgate-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        .font-westgate {
            font-family: 'Westgate', 'Noto Sans JP', sans-serif;
        }

        .text-gold {
            color: var(--gold-accent);
        }

        .nav-link {
            position: relative;
            transition: color 0.4s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--gold-accent);
            transition: width 0.4s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            .px-10 { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
            .pt-64 { padding-top: 8rem !important; }
            .pb-32 { padding-bottom: 2rem !important; }
            .py-32 { padding-top: 3rem !important; padding-bottom: 3rem !important; }
            .py-20 { padding-top: 2rem !important; padding-bottom: 2rem !important; }
            .exhibition-spacing { padding: 3rem 0 !important; }
            h1 { font-size: 1.8rem !important; line-height: 1.4 !important; }
            h2 { font-size: 1.3rem !important; line-height: 1.5 !important; }
            h3 { font-size: 1.05rem !important; }
            .gap-x-20 { gap: 2rem !important; }
            .gap-y-40 { gap: 3rem !important; }
            .gap-24 { gap: 2rem !important; }
            .gap-32 { gap: 2rem !important; }
            .mb-40 { margin-bottom: 2.5rem !important; }
            .mb-32 { margin-bottom: 2rem !important; }
            .mb-20 { margin-bottom: 1.5rem !important; }
            .space-y-40 > * + * { margin-top: 3rem !important; }
            .space-y-32 > * + * { margin-top: 2.5rem !important; }
            .text-5xl { font-size: 1.8rem !important; }
            .text-7xl { font-size: 1.8rem !important; }
            .text-4xl { font-size: 1.4rem !important; }
            .text-3xl { font-size: 1.2rem !important; }
            .text-2xl { font-size: 1rem !important; }
            .md\:text-7xl { font-size: 1.8rem !important; }
            .md\:text-5xl { font-size: 1.8rem !important; }
            .md\:text-4xl { font-size: 1.4rem !important; }
            .leading-\[2\.2\] { line-height: 1.9 !important; }
            .tracking-widest { letter-spacing: 0.05em !important; }
            .tracking-\[0\.3em\] { letter-spacing: 0.1em !important; }
            .max-w-4xl { max-width: 100% !important; }
            .max-w-3xl { max-width: 100% !important; }
            .max-w-5xl { max-width: 100% !important; }
            .aspect-video { aspect-ratio: 16/9 !important; }
            .aspect-\[21\/9\] { aspect-ratio: 4/3 !important; }
            .grid.md\:grid-cols-2 { grid-template-columns: 1fr !important; }
            .grid.md\:grid-cols-3 { grid-template-columns: 1fr !important; }
            .grid.lg\:grid-cols-2 { grid-template-columns: 1fr !important; }
            .grid.lg\:grid-cols-3 { grid-template-columns: 1fr !important; }
        }

        /* ===== LOGO MOBILE FIX ===== */
        @media (max-width: 768px) {
            .font-westgate {
                font-family: 'Westgate', 'Noto Sans JP', sans-serif !important;
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
            nav .font-westgate {
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
            footer .font-westgate {
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
        }
    </style>
</head>

<body class="antialiased">
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-[#0D0D0D]/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-[1600px] mx-auto px-10 py-6 flex justify-between items-center">
            <a href="index.html" class="text-5xl tracking-[0.3em] font-westgate text-white">PENTAFISH</a>
            <div class="hidden lg:flex space-x-16 text-[0.65rem] uppercase tracking-[0.4em] font-light">
                <a href="index.html" class="nav-link">Top</a>
                <a href="philosophy.html" class="nav-link">Philosophy</a>
                <a href="collections.html" class="nav-link">Collections</a>
                <a href="craftsmanship.html" class="nav-link">Craftsmanship</a>
                <a href="journal.html" class="nav-link text-gold">Journal</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="lg:hidden">
            <button id="menu-btn" onclick="toggleMenu()" class="focus:outline-none">
                <i data-lucide="menu" class="w-6 h-6 text-gold"></i>
            </button>
        </div>
    </div>
    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden lg:hidden bg-[#0D0D0D] border-t border-white/5 px-6 py-6 space-y-6 text-[0.65rem] uppercase tracking-[0.4em] font-light">
        <a href="index.html" class="block hover:text-gold transition-colors">Top</a>
        <a href="philosophy.html" class="block hover:text-gold transition-colors">Philosophy</a>
        <a href="collections.html" class="block hover:text-gold transition-colors">Collections</a>
        <a href="craftsmanship.html" class="block hover:text-gold transition-colors">Craftsmanship</a>
        <a href="journal.html" class="block hover:text-gold transition-colors">Journal</a>
        <a href="contact.html" class="block hover:text-gold transition-colors">Contact</a>
    </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-64 pb-32 border-b border-white/5 bg-zinc-950">
        <div class="max-w-[1600px] mx-auto px-10">
            <h1 class="text-5xl md:text-7xl font-bold tracking-[-0.02em] leading-tight serif text-white" style="font-family: 'Playfair Display', serif;">Journal</h1>
        </div>
    </header>

    <!-- Blog Posts Section -->
    <section class="py-32">
        <div class="max-w-4xl mx-auto px-10 space-y-32" id="posts-container">
            <!-- populated by journal-data.js -->
        </div>
    </section>
    <footer class="py-20 bg-[#0D0D0D] border-t border-white/5">
        <div class="max-w-[1600px] mx-auto px-10 text-center text-[0.55rem] tracking-[0.4em] text-zinc-500 uppercase">
            <p>&copy; 2026 PENTAFISH. Journal for the Senses.</p>
        </div>
    </footer>

    <script src="journal-data.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = JOURNAL_POSTS.map(post => `
                <article>
                    <div class="aspect-video bg-zinc-900 mb-10 overflow-hidden relative group">
                        <img src="${post.image}" alt="Journal Photo"
                            class="w-full h-full object-cover grayscale transition-all duration-1000 group-hover:grayscale-0 group-hover:scale-105">
                    </div>
                    <div class="flex items-center gap-6 mb-8">
                        <time class="text-zinc-400 text-[0.6rem] uppercase tracking-[0.4em]">${post.date}</time>
                        <span class="text-gold text-[0.5rem] uppercase tracking-[0.3em] border border-gold/30 px-3 py-1">${post.category}</span>
                    </div>
                    <h2 class="text-lg md:text-xl mb-6 serif hover:text-gold transition-colors cursor-pointer leading-tight">
                        ${post.title}</h2>
                    <p class="text-zinc-400 font-light text-xs leading-[2] tracking-wider mb-10">${post.excerpt}</p>
                    <a href="journal_post.html?id=${post.id}"
                        class="text-xs uppercase tracking-[0.3em] font-bold border-b border-white/10 pb-2 hover:border-gold transition-all">Read More</a>
                </article>
            `).join('');
        }

        renderPosts();
        lucide.createIcons();
    </script>
</body>

</html>
