<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | PENTAFISH</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-solid: #0D0D0D;
            --gold-accent: #D4AF37;
            --light-grey: #F2F2F2;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-solid);
            color: var(--light-grey);
        }

        h1,
        h2,
        h3,
        .serif {
            font-family: 'Noto Sans JP', sans-serif;
        }

        @font-face {
            font-family: 'Westgate';
            src: url('assets/Westgate.woff2') format('woff2'),
                url('assets/Westgate.woff') format('woff'),
                url('assets/Westgate.otf') format('opentype'),
                url('assets/Westgate.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        .font-westgate {
            font-family: 'Westgate', 'Noto Sans JP', sans-serif;
        }

        .text-gold {
            color: var(--gold-accent);
        }

        .nav-link {
            position: relative;
            transition: color 0.4s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--gold-accent);
            transition: width 0.4s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .product-card {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .exhibition-spacing {
            padding: 10rem 0;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            .px-10 { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
            .pt-64 { padding-top: 8rem !important; }
            .pb-32 { padding-bottom: 2rem !important; }
            .py-32 { padding-top: 3rem !important; padding-bottom: 3rem !important; }
            .py-20 { padding-top: 2rem !important; padding-bottom: 2rem !important; }
            .exhibition-spacing { padding: 3rem 0 !important; }
            h1 { font-size: 1.8rem !important; line-height: 1.4 !important; }
            h2 { font-size: 1.3rem !important; line-height: 1.5 !important; }
            h3 { font-size: 1.05rem !important; }
            .gap-x-20 { gap: 2rem !important; }
            .gap-y-40 { gap: 3rem !important; }
            .gap-24 { gap: 2rem !important; }
            .gap-32 { gap: 2rem !important; }
            .mb-40 { margin-bottom: 2.5rem !important; }
            .mb-32 { margin-bottom: 2rem !important; }
            .mb-20 { margin-bottom: 1.5rem !important; }
            .space-y-40 > * + * { margin-top: 3rem !important; }
            .space-y-32 > * + * { margin-top: 2.5rem !important; }
            .text-5xl { font-size: 1.8rem !important; }
            .text-7xl { font-size: 1.8rem !important; }
            .text-4xl { font-size: 1.4rem !important; }
            .text-3xl { font-size: 1.2rem !important; }
            .text-2xl { font-size: 1rem !important; }
            .md\:text-7xl { font-size: 1.8rem !important; }
            .md\:text-5xl { font-size: 1.8rem !important; }
            .md\:text-4xl { font-size: 1.4rem !important; }
            .leading-\[2\.2\] { line-height: 1.9 !important; }
            .tracking-widest { letter-spacing: 0.05em !important; }
            .tracking-\[0\.3em\] { letter-spacing: 0.1em !important; }
            .max-w-4xl { max-width: 100% !important; }
            .max-w-3xl { max-width: 100% !important; }
            .max-w-5xl { max-width: 100% !important; }
            .aspect-video { aspect-ratio: 16/9 !important; }
            .aspect-\[21\/9\] { aspect-ratio: 4/3 !important; }
            .grid.md\:grid-cols-2 { grid-template-columns: 1fr !important; }
            .grid.md\:grid-cols-3 { grid-template-columns: 1fr !important; }
            .grid.lg\:grid-cols-2 { grid-template-columns: 1fr !important; }
            .grid.lg\:grid-cols-3 { grid-template-columns: 1fr !important; }
        }

        /* ===== LOGO MOBILE FIX ===== */
        @media (max-width: 768px) {
            .font-westgate {
                font-family: 'Westgate', 'Noto Sans JP', sans-serif !important;
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
            nav .font-westgate {
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
            footer .font-westgate {
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
        }
    </style>
</head>

<body class="antialiased">
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-[#0D0D0D]/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-[1600px] mx-auto px-10 py-6 flex justify-between items-center">
            <a href="index.html" class="text-5xl tracking-[0.3em] font-westgate text-white">PENTAFISH</a>
            <div class="hidden lg:flex space-x-16 text-[0.65rem] uppercase tracking-[0.4em] font-light">
                <a href="index.html" class="nav-link">Top</a>
                <a href="philosophy.html" class="nav-link">Philosophy</a>
                <a href="collections.html" class="nav-link text-gold">Collections</a>
                <a href="craftsmanship.html" class="nav-link">Craftsmanship</a>
                <a href="journal.html" class="nav-link">Journal</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="lg:hidden">
            <button id="menu-btn" onclick="toggleMenu()" class="focus:outline-none">
                <i data-lucide="menu" class="w-6 h-6 text-gold"></i>
            </button>
        </div>
    </div>
    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden lg:hidden bg-[#0D0D0D] border-t border-white/5 px-6 py-6 space-y-6 text-[0.65rem] uppercase tracking-[0.4em] font-light">
        <a href="index.html" class="block hover:text-gold transition-colors">Top</a>
        <a href="philosophy.html" class="block hover:text-gold transition-colors">Philosophy</a>
        <a href="collections.html" class="block hover:text-gold transition-colors">Collections</a>
        <a href="craftsmanship.html" class="block hover:text-gold transition-colors">Craftsmanship</a>
        <a href="journal.html" class="block hover:text-gold transition-colors">Journal</a>
        <a href="contact.html" class="block hover:text-gold transition-colors">Contact</a>
    </div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="pt-64 pb-32 border-b border-white/5 bg-zinc-950">
        <div class="max-w-[1600px] mx-auto px-10">
            <span class="text-gold uppercase tracking-[0.6em] text-[0.6rem] mb-6 block font-bold italic">Curated
                Gallery</span>
            <h1 class="text-5xl md:text-7xl font-bold tracking-[-0.02em] leading-tight serif text-white" style="font-family: 'Playfair Display', serif;">Collections
            </h1>
        </div>
    </header>

    <!-- Gallery Section -->
    <section class="exhibition-spacing">
        <div class="max-w-[1600px] mx-auto px-10">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-x-20 gap-y-40">
                <!-- Item 1: Handmade Lure -->
                <a href="product_with-beak-s2.html" class="product-card group block">
                    <div class="aspect-[3/4] bg-zinc-900 mb-12 overflow-hidden relative">
                        <img src="assets/lure_a.png" alt="Lure A"
                            class="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105">
                        <div
                            class="absolute inset-0 border-[20px] border-transparent group-hover:border-white/5 transition-all pointer-events-none">
                        </div>
                    </div>
                    <h3 class="text-2xl mb-6 tracking-wider" style="font-family: 'Playfair Display', serif;">With Beak S2</h3>
                </a>

                <!-- Item 2: Fashion/Apparel (Using lure_b as placeholder style) -->
                <a href="product_kamaitachi.html" class="product-card group block">
                    <div class="aspect-[3/4] bg-zinc-900 mb-12 overflow-hidden relative">
                        <img src="assets/lure_b.png" alt="Apparel Placeholder"
                            class="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105">
                        <div
                            class="absolute inset-0 border-[20px] border-transparent group-hover:border-white/5 transition-all pointer-events-none">
                        </div>
                    </div>
                    <h3 class="text-2xl mb-6 tracking-wider" style="font-family: 'Playfair Display', serif;">Kamaitachi</h3>
                </a>

                <!-- Item 3: Gear -->
                <a href="product_to-stomp.html" class="product-card group block">
                    <div class="aspect-[3/4] bg-zinc-900 mb-12 overflow-hidden relative">
                        <img src="assets/lure_c.png" alt="Gear Placeholder"
                            class="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105">
                        <div
                            class="absolute inset-0 border-[20px] border-transparent group-hover:border-white/5 transition-all pointer-events-none">
                        </div>
                    </div>
                    <h3 class="text-2xl mb-6 tracking-wider" style="font-family: 'Playfair Display', serif;">To Stomp</h3>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 bg-[#0D0D0D] border-t border-white/5">
        <div
            class="max-w-[1600px] mx-auto px-10 text-center md:text-left flex flex-col md:flex-row justify-between items-center text-[0.55rem] tracking-[0.4em] text-zinc-500 uppercase">
            <p>&copy; 2026 PENTAFISH. All rights reserved.</p>
            <div class="flex gap-10 mt-6 md:mt-0">
                <a href="#" class="hover:text-gold transition-colors">Shop Info</a>
                <a href="#" class="hover:text-gold transition-colors">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <script>lucide.createIcons();</script>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
    </script>
</body>

</html>
