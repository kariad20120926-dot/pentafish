    <style>
        :root { --bg:#0D0D0D; --gold:#B89A4E; --grey:#F2F2F2; --nav:96px; }
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--grey);
        }

        @font-face {
            font-family: 'Westgate';
            src: url('assets/Westgate-Regular.otf') format('opentype');
            font-display: swap;
        }
        .font-westgate { font-family: 'Westgate', 'Playfair Display', serif; }
        .text-gold { color: var(--gold); }
        .nav-link { position: relative; transition: color .4s; }
        .nav-link::after {
            content: ''; position: absolute;
            width: 0; height: 1px; bottom: -4px; left: 0;
            background: var(--gold); transition: width .4s;
        }
        .nav-link:hover::after { width: 100%; }

        /* ══════════════════════════════════════════════
           LAYOUT WRAPPER
           nav は fixed なので wrapper で 80px 分を確保し、
           その下で header + page が縦に並ぶ
        ══════════════════════════════════════════════ */
        /* ── PAGE HEADER（他ページと同一スタイル） */

        /* ── BODY AREA ── */
        /* ヘッダー内 div と同じ max-w / 横 padding で揃える */
        #page {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 2.5rem;   /* px-10 = 2.5rem */
            display: flex;
            align-items: flex-start;
        }

        /* ── LEFT SIDEBAR ── */
        #sidebar {
            width: 260px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255,255,255,.06);
            position: sticky;
            top: var(--nav);
            height: calc(100vh - var(--nav));
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        #sidebar::-webkit-scrollbar { width: 2px; }
        #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }

        .sidebar-top {
            padding: 28px 20px 18px 0;
            border-bottom: 1px solid rgba(255,255,255,.05);
            flex-shrink: 0;
        }
        .sidebar-top span {
            font-size: .44rem;
            letter-spacing: .45em;
            text-transform: uppercase;
            color: #52525b;
        }

        /* category button */
        .cat-row { padding: 0 20px 0 0; }
        .cat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,.05);
            background: none;
            text-align: left;
            color: var(--grey);
            cursor: pointer;
            transition: color .3s;
        }
        .cat-btn:hover  { color: var(--gold); }
        .cat-btn.active { color: var(--gold); }

        .cat-num {
            font-size: .4rem;
            letter-spacing: .2em;
            color: #52525b;
            width: 18px;
            flex-shrink: 0;
            transition: color .3s;
        }
        .cat-btn.active .cat-num { color: rgba(184,154,78,.5); }

        .cat-label {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: .04em;
            flex: 1;
            white-space: nowrap;
        }

        .cat-chevron {
            width: 13px; height: 13px;
            color: #52525b;
            flex-shrink: 0;
            transition: transform .35s, color .3s;
        }
        .cat-btn.active .cat-chevron {
            transform: rotate(90deg);
            color: var(--gold);
        }

        /* product sub-list */
        .prod-list {
            overflow: hidden;
            max-height: 0;
            transition: max-height .4s cubic-bezier(.4,0,.2,1);
            padding: 0 0 0 28px;
        }
        .prod-list.open { max-height: 320px; }

        .prod-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,.03);
            font-family: 'Playfair Display', serif;
            font-size: .8rem;
            letter-spacing: .04em;
            color: #71717a;
            cursor: pointer;
            transition: color .3s;
        }
        .prod-item:hover  { color: var(--grey); }
        .prod-item.active { color: var(--gold); }
        .prod-item .dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }
        .prod-item.soon {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: .55rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #71717a;
            cursor: default;
        }
        .prod-item.soon:hover { color: #71717a; }

        /* ── RIGHT MAIN AREA ── */
        #main {
            flex: 1;
            min-width: 0;
            padding: 52px 0 80px 64px;
            display: flex;
            flex-direction: column;
        }

        /* welcome state */
        #welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50vh;
        }
        #welcome .w-label {
            display: block;
            font-size: .48rem;
            letter-spacing: .5em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
        }
        #welcome h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            font-weight: 700;
            line-height: 1.3;
            color: #27272a;
            margin-bottom: 20px;
        }
        #welcome p {
            font-size: .6rem;
            letter-spacing: .18em;
            color: #3f3f46;
        }

        /* section header (when cat selected) */
        .section-head {
            margin-bottom: 40px;
            padding-bottom: 28px;
            border-bottom: 1px solid rgba(255,255,255,.06);
        }
        .section-head .s-label {
            display: block;
            font-size: .47rem;
            letter-spacing: .5em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .section-head h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 700;
            letter-spacing: .02em;
            line-height: 1.1;
        }

        /* product grid */
        .prod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 40px 24px;
        }
        .prod-card {
            display: block;
            cursor: pointer;
            transition: transform .5s cubic-bezier(.4,0,.2,1);
        }
        .prod-card:hover { transform: translateY(-10px); }
        .prod-card-img {
            aspect-ratio: 3/4;
            background: #111;
            overflow: hidden;
            position: relative;
            margin-bottom: 16px;
        }
        .prod-card-img img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(55%);
            transition: filter .65s, transform .7s;
        }
        .prod-card:hover .prod-card-img img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }
        .prod-card-img .frame {
            position: absolute; inset: 0;
            border: 16px solid transparent;
            transition: border-color .5s;
            pointer-events: none;
        }
        .prod-card:hover .frame { border-color: rgba(255,255,255,.04); }
        .prod-card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            letter-spacing: .05em;
            margin-bottom: 8px;
            transition: color .3s;
        }
        .prod-card:hover .prod-card-name { color: var(--gold); }
        .prod-card-cta {
            font-size: .46rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: #52525b;
            border-bottom: 1px solid rgba(255,255,255,.08);
            padding-bottom: 3px;
            display: inline-block;
            transition: color .3s, border-color .3s;
        }
        .prod-card:hover .prod-card-cta {
            color: var(--gold);
            border-color: rgba(184,154,78,.4);
        }

        /* parts card */
        .parts-wrap { max-width: 440px; }
        .parts-card {
            border: 1px solid rgba(255,255,255,.1);
            padding: 32px 36px;
            transition: border-color .4s;
        }
        .parts-card:hover { border-color: rgba(184,154,78,.35); }
        .parts-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            letter-spacing: .04em;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .parts-sub {
            font-size: .6rem;
            letter-spacing: .15em;
            color: #71717a;
            margin-bottom: 18px;
        }
        .parts-tag {
            display: inline-block;
            font-size: .42rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            border: 1px solid rgba(184,154,78,.3);
            color: var(--gold);
            padding: 4px 12px;
        }

        /* coming soon */
        .soon-wrap { padding: 48px 0; }
        .soon-wrap .st {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #52525b;
            margin-bottom: 14px;
        }
        .soon-line {
            width: 36px; height: 1px;
            background: rgba(255,255,255,.06);
            margin: 18px 0;
        }
        .soon-wrap .sm {
            font-size: .56rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: #71717a;
        }

        /* fade-in */
        .fade-in { animation: fadeUp .4s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── LOGO MOBILE FIX（他ページと共通）── */
        @media (max-width: 768px) {
            .font-westgate {
                font-family: 'Westgate', 'Noto Sans JP', sans-serif !important;
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
            nav .font-westgate {
                font-size: 1.4rem !important;
                letter-spacing: 0.15em !important;
            }
        }

        /* ── MOBILE ── */
        @media (max-width: 767px) {
            .pt-64 { padding-top: 8rem !important; }
            .pb-32 { padding-bottom: 2rem !important; }
            #page {
                flex-direction: column;
                padding: 0 1.25rem;
            }
            #sidebar {
                width: 100%;
                position: static;
                height: auto;
                overflow: visible;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,.06);
            }
            .sidebar-top { padding: 16px 0 14px; }
            .cat-row    { padding: 0; }
            .prod-list  { padding: 0 0 0 28px; }
            #main { padding: 32px 0 60px; }
            #welcome { min-height: 40vh; }
            .prod-grid  { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 28px 16px; }
        }
    </style>

<body class="antialiased">

        <a href="index.html"         class="block hover:text-gold transition-colors">Top</a>
        <a href="philosophy.html"    class="block hover:text-gold transition-colors">Philosophy</a>

<!-- Page header（Philosophyと同じ構造） -->
<header id="page-header" class="pt-64 pb-32 border-b border-white/5 bg-zinc-950">
    <div class="max-w-[1600px] mx-auto px-10">
        <h1 class="text-5xl md:text-7xl font-bold tracking-[-0.02em] leading-tight text-white"
            style="font-family:'Playfair Display',serif;">Collections</h1>
    </div>
</header>

<!-- Body: sidebar + main -->
<div id="page">

    <!-- LEFT: tree navigation（sticky） -->
    <nav id="sidebar">
        <div class="sidebar-top">
            <span>Browse by Category</span>
        </div>
        <div id="tree"></div>
    </nav>

    <!-- RIGHT: content area -->
    <main id="main">
        <div id="welcome">
            <span class="w-label">PENTAFISH Collections</span>
            <h2>Select a<br>category.</h2>
            <p>Choose a category from the left menu</p>
        </div>
        <div id="content" style="display:none;"></div>
    </main>

</div>

<script>
/* ════════════════════════════════════════════════════
   Data
════════════════════════════════════════════════════ */
const CATALOG = [
    {
        id: 'lure', num: '01', labelEn: 'Lure',
        desc: 'Hard Baits · Plugs · Salt Water',
        products: [
            { id:'l1', title:'With Beak S2', href:'product_with-beak-s2.html', image:'assets/lure_a.png' },
            { id:'l2', title:'Kamaitachi',   href:'product_kamaitachi.html',   image:'assets/lure_b.png' },
            { id:'l3', title:'To Stomp',     href:'product_to-stomp.html',     image:'assets/lure_c.png' },
            { id:'l4', title:'To Pluck',     href:'product_to-pluck.html',     image:'assets/lure_d.jpg' },
        ]
    },
    {
        id: 'float', num: '02', labelEn: 'Float',
        desc: 'Fresh Water · Floats & Indicators',
        products: []
    },
    {
        id: 'parts', num: '03', labelEn: 'Reel Parts',
        desc: 'Precision Machined Replacement Parts',
        products: [
            { id:'p1', title:'PEEK Brake Block', sub:'abu Garcia 5000~6000 Series', href:null, image:null }
        ]
    }
];

let activeCat = null;

/* ════════════════════════════════════════════════════
   Build tree
════════════════════════════════════════════════════ */
function buildTree() {
    document.getElementById('tree').innerHTML = CATALOG.map(cat => `
        <div class="cat-row">
            <button class="cat-btn" id="btn-${cat.id}" onclick="selectCat('${cat.id}')">
                <span class="cat-num">${cat.num}</span>
                <span class="cat-label">${cat.labelEn}</span>
                <i data-lucide="chevron-right" class="cat-chevron"></i>
            </button>
            <div class="prod-list" id="list-${cat.id}">
                ${buildSubItems(cat)}
            </div>
        </div>
    `).join('');
    lucide.createIcons();
}

function buildSubItems(cat) {
    if (cat.products.length === 0)
        return `<div class="prod-item soon"><span class="dot"></span>Coming Soon</div>`;
    return cat.products.map(p => `
        <div class="prod-item" id="pi-${p.id}"
             onclick="${p.href ? `window.location='${p.href}'` : ''}">
            <span class="dot"></span>${p.title}
        </div>
    `).join('');
}

/* ════════════════════════════════════════════════════
   Select category
════════════════════════════════════════════════════ */
function selectCat(catId) {
    if (activeCat === catId) {
        activeCat = null;
        document.getElementById('btn-'  + catId).classList.remove('active');
        document.getElementById('list-' + catId).classList.remove('open');
        showWelcome();
        return;
    }
    if (activeCat) {
        document.getElementById('btn-'  + activeCat)?.classList.remove('active');
        document.getElementById('list-' + activeCat)?.classList.remove('open');
    }
    activeCat = catId;
    document.getElementById('btn-'  + catId).classList.add('active');
    document.getElementById('list-' + catId).classList.add('open');
    renderContent(CATALOG.find(c => c.id === catId));
}

function showWelcome() {
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('content').style.display = 'none';
}

/* ════════════════════════════════════════════════════
   Render right panel
════════════════════════════════════════════════════ */
function renderContent(cat) {
    document.getElementById('welcome').style.display = 'none';
    const el = document.getElementById('content');
    el.style.display = 'block';
    el.classList.remove('fade-in');
    void el.offsetWidth;
    el.classList.add('fade-in');

    let html = `
        <div class="section-head">
            <span class="s-label">${cat.desc}</span>
            <h2>${cat.labelEn}</h2>
        </div>`;

    if (cat.products.length === 0) {
        html += `
            <div class="soon-wrap">
                <div class="st">Coming Soon</div>
                <div class="soon-line"></div>
                <div class="sm">Available soon — stay tuned</div>
            </div>`;
    } else if (cat.products.some(p => p.image)) {
        html += `<div class="prod-grid">
            ${cat.products.map(p => `
                <a href="${p.href}" class="prod-card">
                    <div class="prod-card-img">
                        <img src="${p.image}" alt="${p.title}">
                        <div class="frame"></div>
                    </div>
                    <div class="prod-card-name">${p.title}</div>
                    <span class="prod-card-cta">View Product</span>
                </a>`).join('')}
        </div>`;
    } else {
        html += `<div class="parts-wrap">
            ${cat.products.map(p => `
                <div class="parts-card">
                    <div class="parts-name">${p.title}</div>
                    ${p.sub ? `<div class="parts-sub">${p.sub}</div>` : ''}
                    <div class="parts-tag">Machined Parts</div>
                </div>`).join('')}
        </div>`;
    }
    el.innerHTML = html;
}

/* ════════════════════════════════════════════════════
   Init
════════════════════════════════════════════════════ */
function toggleMenu() {
    document.getElementById('mobile-menu').classList.toggle('hidden');
}

lucide.createIcons();
window.addEventListener('DOMContentLoaded', buildTree);
</script>
</body>
